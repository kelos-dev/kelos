name: Release

on:
  push:
    branches: [main, prod]
    tags: ["v*"]

concurrency:
  group: release-anomalo
  cancel-in-progress: false

env:
  REGISTRY: 580663733917.dkr.ecr.us-west-1.amazonaws.com/kelos

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    needs: determine-version
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-west-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: make image IMAGE_PLATFORMS=linux/${{ matrix.arch }} PUSH=true VERSION="$VERSION-${{ matrix.arch }}" REGISTRY="${{ env.REGISTRY }}"

  merge-manifests:
    needs: [determine-version, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-west-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create and push multi-arch manifests
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: make manifest IMAGE_PLATFORMS=linux/amd64,linux/arm64 VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}"

      - name: Create and push latest manifests
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: make manifest IMAGE_PLATFORMS=linux/amd64,linux/arm64 VERSION=latest SOURCE_VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}"

  release-artifacts:
    needs: [determine-version, merge-manifests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt

  publish-helm-chart:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: release-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 3.20.1

      - name: Determine version
        id: version
        run: |
          # Extract version without 'v' prefix (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-west-1

      - name: Login to Amazon ECR for Helm
        run: |
          aws ecr get-login-password --region us-west-1 | helm registry login --username AWS --password-stdin 580663733917.dkr.ecr.us-west-1.amazonaws.com

      - name: Set image tag in chart values
        run: |
          sed -i 's|tag: "latest"|tag: "${{ github.ref_name }}"|' \
            internal/manifests/charts/kelos/values.yaml
          grep -q 'tag: "${{ github.ref_name }}"' \
            internal/manifests/charts/kelos/values.yaml

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/charts
          helm package internal/manifests/charts/kelos \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ github.ref_name }} \
            --destination /tmp/charts

      - name: Push Helm chart to ECR
        run: |
          helm push /tmp/charts/kelos-${{ steps.version.outputs.version }}.tgz oci://580663733917.dkr.ecr.us-west-1.amazonaws.com/kelos/charts

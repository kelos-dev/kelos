name: Release

on:
  push:
    branches: [main, prod]
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: public.ecr.aws
  IMAGE_NAME: anomalo/kelos

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILDX_CACHE: --cache-from type=gha --cache-to type=gha,mode=max
        run: make push-multiarch VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Push latest tags for releases
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILDX_CACHE: --cache-from type=gha
        run: make push-multiarch VERSION=latest REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Build CLI binaries
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt

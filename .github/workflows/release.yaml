name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILDX_CACHE: --cache-from type=gha --cache-to type=gha,mode=max
        run: make push-multiarch VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Push latest tags for releases
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILDX_CACHE: --cache-from type=gha
        run: make push-multiarch VERSION=latest REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Build CLI binaries
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt

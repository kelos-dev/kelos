name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip if this is a bot commit updating the formula (prevents double builds)
    if: github.actor != 'kelos-dev[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make image VERSION="$VERSION"

      - name: Push images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make push VERSION="$VERSION"

      - name: Push latest tags for releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          make image VERSION=latest
          make push VERSION=latest

      - name: Build CLI binaries
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt

      - name: Checkout Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4
        with:
          repository: kelos-dev/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Copy formula template to tap repo
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp Formula/kelos.rb homebrew-tap/Formula/kelos.rb

      - name: Update Homebrew formula
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: bash hack/update-homebrew-formula.sh "$VERSION" homebrew-tap

      - name: Commit and push Homebrew formula update
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: homebrew-tap
        run: |
          git config user.name "kelos-dev[bot]"
          git config user.email "kelos-dev@users.noreply.github.com"
          git add Formula/kelos.rb
          git commit -m "chore: update Homebrew formula for ${{ steps.version.outputs.version }}" || true
          git push

  publish-helm-chart:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 3.20.1

      - name: Determine version
        id: version
        run: |
          # Extract version without 'v' prefix (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          helm registry login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag in chart values
        run: |
          sed -i 's|tag: "latest"|tag: "${{ github.ref_name }}"|' \
            internal/manifests/charts/kelos/values.yaml
          grep -q 'tag: "${{ github.ref_name }}"' \
            internal/manifests/charts/kelos/values.yaml

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/charts
          helm package internal/manifests/charts/kelos \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ github.ref_name }} \
            --destination /tmp/charts

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/charts/kelos-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/kelos-dev/charts

{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
    {{- if .Values.crds.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
  name: agentturns.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: AgentTurn
    listKind: AgentTurnList
    plural: agentturns
    singular: agentturn
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.sessionRef.name
      name: Session
      type: string
    - jsonPath: .spec.sequence
      name: Seq
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentTurn is the Schema for explicit turns inside an AgentSession.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentTurnSpec defines desired AgentTurn state.
            properties:
              context:
                description: Context is the materialized side-conversation delta.
                properties:
                  fromTSExclusive:
                    description: FromTSExclusive is the lower Slack timestamp bound.
                    type: string
                  mode:
                    description: Mode records how the transcript window was selected.
                    type: string
                  toTSInclusive:
                    description: ToTSInclusive is the upper Slack timestamp bound.
                    type: string
                  transcript:
                    description: Transcript contains the side conversation delta for
                      this turn.
                    type: string
                  transcriptBytes:
                    description: TranscriptBytes is the size of Transcript in bytes.
                    format: int32
                    type: integer
                required:
                - mode
                - toTSInclusive
                type: object
              input:
                description: Input is the explicit request.
                properties:
                  body:
                    description: Body is the semantic request body.
                    type: string
                  text:
                    description: Text is the raw Slack message text.
                    type: string
                required:
                - body
                - text
                type: object
              sequence:
                description: Sequence is the FIFO sequence number within the session.
                format: int32
                type: integer
              sessionRef:
                description: SessionRef identifies the AgentSession this turn belongs
                  to.
                properties:
                  name:
                    description: Name is the name of the AgentSession resource.
                    type: string
                required:
                - name
                type: object
              source:
                description: Source identifies the external message that created this
                  turn.
                properties:
                  botID:
                    description: BotID is the Slack bot ID when the author is a bot.
                    type: string
                  channelID:
                    description: ChannelID is the Slack channel ID.
                    type: string
                  messageTS:
                    description: MessageTS is the Slack timestamp of the explicit
                      mention.
                    type: string
                  permalink:
                    description: Permalink is a Slack permalink to the message.
                    type: string
                  rootTS:
                    description: RootTS is the Slack root thread timestamp.
                    type: string
                  teamID:
                    description: TeamID is the Slack workspace/team ID when available.
                    type: string
                  type:
                    description: |-
                      Type identifies the source shape. The first implementation supports
                      SlackMessage.
                    type: string
                  userID:
                    description: UserID is the Slack user ID of the message author.
                    type: string
                required:
                - channelID
                - messageTS
                - rootTS
                - type
                type: object
            required:
            - context
            - input
            - sequence
            - sessionRef
            - source
            type: object
          status:
            description: AgentTurnStatus defines observed AgentTurn state.
            properties:
              activity:
                description: Activity is a short live activity message.
                type: string
              codexTurnID:
                description: CodexTurnID is the Codex App Server turn ID.
                type: string
              completedAt:
                description: CompletedAt is when the turn reached a terminal phase.
                format: date-time
                type: string
              conditions:
                description: Conditions provides detailed status information.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: Message provides additional status detail.
                type: string
              phase:
                description: Phase represents the current turn phase.
                type: string
              resultText:
                description: ResultText is the terminal Cody response text.
                type: string
              slackAgentMessageTS:
                description: SlackAgentMessageTS is the Slack timestamp of Cody's
                  terminal response.
                type: string
              slackProgressMessageTS:
                description: SlackProgressMessageTS is the Slack timestamp of the
                  progress message.
                type: string
              startedAt:
                description: StartedAt is when the runner began the turn.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}

crds:
  install: false
  keep: true

image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

# codexAuthRefresher lets the controller manage one scheduled Codex-image
# CronJob in the target namespace per Secret labeled
# kelos.dev/codex-oauth-refresh=true, keeping Codex OAuth credentials valid even
# when no agent task runs for a while.
codexAuthRefresher:
  schedule: "0 */6 * * *"

controllerImage: ghcr.io/kelos-dev/kelos-controller
ghproxy:
  image: ghcr.io/kelos-dev/ghproxy
  allowedUpstreams: "https://api.github.com"
  cacheTTL: ""
  resources:
    requests: ""
    limits: ""
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
workerRunner:
  image: ghcr.io/kelos-dev/kelos-worker-runner
sessionRuntime:
  image: ghcr.io/kelos-dev/kelos-session-runtime
sessionServer:
  enabled: false
  image: ghcr.io/kelos-dev/kelos-session-server
  replicas: 1
  secretName: ""
  tokenKey: token
  # Initial active namespace in the Session web application.
  defaultNamespace: default
  secureCookie: false
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi
controller:
  resources:
    requests: {}
    limits: {}

# observability configures OpenTelemetry (OTLP) export. When otlp.endpoint is
# set, the controller and the spawner Deployments it launches push metrics and
# traces to that OTLP collector, in addition to the existing Prometheus
# /metrics endpoint. Leave otlp.endpoint empty to keep Prometheus-only behavior
# (zero migration for existing operators).
observability:
  otlp:
    # OTEL_EXPORTER_OTLP_ENDPOINT, e.g. http://otel-collector:4317
    endpoint: ""
    # OTEL_EXPORTER_OTLP_PROTOCOL: grpc (default) or http/protobuf
    protocol: ""
    # OTEL_EXPORTER_OTLP_HEADERS for NON-SENSITIVE headers only, e.g.
    # "x-tenant=team-a". Do NOT put bearer tokens here — this value is rendered
    # in plaintext into the Deployment manifest. Use headersSecretName for
    # tokens (it takes precedence over this plaintext value).
    headers: ""
    # Name of a Secret providing OTEL_EXPORTER_OTLP_HEADERS (preferred for
    # bearer tokens). When set, it takes precedence over the plaintext headers
    # above and is mounted via secretKeyRef instead of a literal value.
    headersSecretName: ""
    # Key within the headersSecretName Secret holding the headers value.
    headersSecretKey: "OTEL_EXPORTER_OTLP_HEADERS"
    # OTEL_RESOURCE_ATTRIBUTES, e.g. "deployment.environment=production"
    resourceAttributes: ""
webhookServer:
  image: ghcr.io/kelos-dev/kelos-webhook-server
  sources:
    github:
      enabled: false
      replicas: 1
      secretName: ""
      githubSecretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
    linear:
      enabled: false
      replicas: 1
      secretName: ""
      apiKeySecretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
    generic:
      enabled: false
      replicas: 1
      # Reserved for future per-source HMAC validation. The generic endpoint
      # is currently unauthenticated; when set, these env vars are mounted but
      # no code reads them.
      secretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  gateway:
    enabled: false
    gatewayClassName: ""
    gatewayName: "kelos-webhook-gateway"
    host: ""
    annotations: {}
    tls:
      enabled: false
      certificateRefs: []
slackServer:
  enabled: false
  image: ghcr.io/kelos-dev/kelos-slack-server
  replicas: 1
  secretName: ""
  # Message posted when the bot joins a channel. Leave empty to disable.
  joinMessage: ""
  # Deny service to externally shared (Slack Connect) channels.
  denySlackConnectChannels: false
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

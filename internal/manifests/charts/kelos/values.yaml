crds:
  install: true
  keep: true

image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

controllerImage: ghcr.io/kelos-dev/kelos-controller
ghproxy:
  image: ghcr.io/kelos-dev/ghproxy
  allowedUpstreams: "https://api.github.com"
  cacheTTL: ""
  resources:
    requests: ""
    limits: ""
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
controller:
  resources:
    requests: {}
    limits: {}
slackServer:
  enabled: false
  image: ghcr.io/kelos-dev/kelos-slack-server
  replicas: 1
  secretName: ""
  # Message posted when the bot joins a channel. Leave empty to disable.
  joinMessage: ""
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
webhookServer:
  image: ghcr.io/kelos-dev/kelos-webhook-server
  sources:
    github:
      enabled: false
      replicas: 1
      secretName: ""
      githubSecretName: ""
    linear:
      enabled: false
      replicas: 1
      secretName: ""
      apiKeySecretName: ""
    generic:
      enabled: false
      replicas: 1
      # Name of a Secret containing per-source HMAC keys as individual keys.
      # Each key should be named <SOURCE>_WEBHOOK_SECRET (e.g.,
      # NOTION_WEBHOOK_SECRET, SENTRY_WEBHOOK_SECRET).
      secretName: ""
      # Extra env vars sourced from individual Kubernetes secrets.
      # Useful when each webhook source has its own Secret and the key
      # needs to be remapped to the <SOURCE>_WEBHOOK_SECRET convention.
      # Example:
      #   extraEnv:
      #     - name: LINEAR_COMMENT_WEBHOOK_SECRET
      #       secretName: linear-comment-webhook-secret
      #       key: WEBHOOK_SECRET
      extraEnv: []
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  gateway:
    enabled: false
    gatewayClassName: ""
    gatewayName: "kelos-webhook-gateway"
    host: ""
    annotations: {}
    tls:
      enabled: false
      certificateRefs: []

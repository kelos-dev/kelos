image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

controllerImage: ghcr.io/kelos-dev/kelos-controller
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
tokenRefresher:
  image: ghcr.io/kelos-dev/kelos-token-refresher
  resources:
    requests: ""
    limits: ""
controller:
  resources:
    requests: {}
    limits: {}

webhook:
  enabled: false
  labels: {}
  image: ghcr.io/kelos/kelos-webhook-receiver
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    ingressClassName: ""
    host: ""
    path: /
    labels: {}
    annotations: {}
    tls: []
  eventsNamespace: kelos-system
  extraEnv: []
  # Name of an existing Secret containing the GitHub webhook secret
  # The secret must have a key named "secret"
  githubWebhookSecretName: ""
  resources:
    requests: {}
    limits: {}

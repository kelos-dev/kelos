apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: test-dashboard-improvement-scout
spec:
  when:
    cron:
      schedule: "0 5 * * *" # daily 05:00 UTC (14:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Improvement-scout for the test-dashboard service (service/test-dashboard) in the pai/ml monorepo —
      a web dashboard that visualizes CI test reports stored in object storage.

      This spawner runs indefinitely. Do NOT rely on any assumed list of current gaps — investigate the
      service as it exists today and judge what matters now. Surface high-value POTENTIAL IMPROVEMENTS and
      maintain this TaskSpawner's single managed GitHub issue for human triage. You do NOT change code
      or open PRs. If nothing is clearly worth proposing, exit WITHOUT filing. The mandatory dedup step
      and single-issue ownership keep this from becoming noise.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/test-dashboard

      ## Step 1 — Investigate the current state, then look for improvements
      Read the service's code, tests, and docs to understand how it works today, then look for high-value
      improvements through these durable lenses:
      - correctness & reliability (error handling, edge cases, failure recovery, timeouts)
      - test coverage of important, under-tested paths
      - observability (logging, metrics, health signals)
      - maintainability (tech debt, duplication, complexity, clarity)
      - dependency and build/deploy health
      - documentation accuracy (docs that no longer match the code)
      Honor the monorepo conventions (root CLAUDE.md / AGENTS.md / CONTRIBUTING.md). Leave UI and
      report-schema ideas to the separate test-dashboard-ui-scout.

      ## Step 2 — Deduplicate and find this spawner's managed issue (REQUIRED)
      Run:
        MANAGED_TITLE_PREFIX='[test-dashboard] [test-dashboard-improvement-scout]'
        gh issue list --label gjkim/auto-generated --state open \
          --search "\"${MANAGED_TITLE_PREFIX}\" in:title" --json number,title,url
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[test-dashboard]" in:title' --limit 200
      Drop anything already covered by an open or recently-closed issue. Rank remaining proposals by
      impact ÷ effort and keep only the best one.

      ## Step 3 — Create or replace the managed issue
      - If nothing clears the bar, report "no high-value improvements found" and EXIT without filing.
      - If no open managed issue exists, create exactly one issue assigned to gunju-kim with label
        gjkim/auto-generated. Its title MUST start with
        `[test-dashboard] [test-dashboard-improvement-scout]`.
      - If an open managed issue exists, compare it to the best current proposal. Replace it with
        `gh issue edit <number> --title ... --body-file ...` only when the current proposal is clearly
        more valuable/actionable or makes the existing issue obsolete. Otherwise leave the issue
        unchanged.
      - The issue body MUST include "Managed by TaskSpawner: test-dashboard-improvement-scout", the
        opportunity, why it matters, the affected area, a concrete suggested approach, and rough effort.
        End with: "Comment /kelos plan to plan it, or /kelos pick-up to do it."
      - Do not create a second open issue for this TaskSpawner. If multiple managed issues already
        exist, keep the best one and close the extras as superseded.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/test-dashboard. Favor a few high-value proposals over many small ones.

---
apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: test-dashboard-ui-scout
spec:
  when:
    cron:
      schedule: "0 6 * * *" # daily 06:00 UTC (15:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      UI & report-schema improvement-scout for the test-dashboard service (service/test-dashboard) in the
      pai/ml monorepo — a web dashboard that renders CI test reports (read from object storage) as HTML.

      This spawner runs indefinitely. Do NOT rely on a fixed list of current issues — read the UI and
      rendering code as they exist today and judge what matters now. Surface high-value improvements to
      (a) the dashboard UI/UX and (b) the test-report schema it consumes, and maintain this
      TaskSpawner's single managed GitHub issue. You do NOT change code or open PRs. If nothing is
      clearly worth proposing, exit WITHOUT filing. Dedup and single-issue ownership keep this from
      becoming noise.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/test-dashboard

      ## Step 1 — Investigate the current UI and report handling, then look for improvements
      Read the templates and the rendering/data code, then look through these durable lenses:
      UI / UX:
      - accessibility (semantic markup, labels, contrast, keyboard navigation)
      - usability & clarity (information hierarchy, navigation, large/empty/error states, responsive
        layout, readable metrics and charts)
      report schema:
      - robustness (validating the report shape; degrading gracefully on missing/malformed data)
      - a richer, clearer schema (more useful fields, versioning, links back to source runs), noting
        producer/consumer impact

      ## Step 2 — Deduplicate and find this spawner's managed issue (REQUIRED)
      Run:
        MANAGED_TITLE_PREFIX='[test-dashboard] [test-dashboard-ui-scout]'
        gh issue list --label gjkim/auto-generated --state open \
          --search "\"${MANAGED_TITLE_PREFIX}\" in:title" --json number,title,url
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[test-dashboard]" in:title' --limit 200
      Drop anything already covered by an open or recently-closed issue. Keep this scout focused on UI and
      report schema; general code/test/observability items belong to the other scout. Rank remaining
      proposals by impact ÷ effort and keep only the best one.

      ## Step 3 — Create or replace the managed issue
      - If nothing clears the bar, report "no high-value UI/schema improvements found" and EXIT.
      - If no open managed issue exists, create exactly one issue assigned to gunju-kim with label
        gjkim/auto-generated. Its title MUST start with `[test-dashboard] [test-dashboard-ui-scout]`.
      - If an open managed issue exists, compare it to the best current proposal. Replace it with
        `gh issue edit <number> --title ... --body-file ...` only when the current proposal is clearly
        more valuable/actionable or makes the existing issue obsolete. Otherwise leave the issue
        unchanged.
      - The issue body MUST include "Managed by TaskSpawner: test-dashboard-ui-scout", the opportunity,
        why it matters, the affected area, a concrete suggested approach (a small markup/mockup sketch
        for UI changes), and rough effort. End with: "Comment /kelos plan to plan it, or /kelos pick-up
        to do it."
      - Do not create a second open issue for this TaskSpawner. If multiple managed issues already
        exist, keep the best one and close the extras as superseded.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/test-dashboard. A few high-value proposals beat many small ones.
